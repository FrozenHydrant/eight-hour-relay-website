<!DOCTYPE html>
<html>
    <head>
        <script src="/static/js/profile_edits.js"></script>
        <link rel="stylesheet" href="/static/css/profile2.css">
    </head>
    <body>
        <div class="top_bar_info">
            <div class="top_bar_insides">
                <a class="top_bar_normal" href="{{ url_for('index') }}">Home</a>
            </div>
        </div>
        <div class="main_frame">
            <div class="main_panel">
                <div class="bonus_info">
                    <div class="bonus_info_inside">
                    <h3>User Info</h3></div>
                </div>
                <div class="main_info">
                    <p>Email: {{ email }}</p>
                    <p>Password: ****</p>
                </div>
            </div>
            <div class="more_info">
                <h3>Extra Information</h3>
                <form method="post" class="info_form">
                    <input type="text" name="first_name" placeholder="First Name" value="{{ user_info['first_name'] }}">
                    <input type="text" name="last_name" placeholder="Last Name" value="{{ user_info['last_name'] }}">
                    <select name="gender" class="dropdown" required>
                        {% if not user_info['gender'] or user_info['gender'] not in genders_mapping %}
                            <option disabled selected value>Gender</option>
                        {% else %}
                            <option selected value="{{ user_info['gender'] }}">{{ genders_mapping[user_info['gender']] }}</option>
                        {% endif %}
                        {% for gender in genders_mapping %}
                            {% if gender != user_info['gender'] %}
                                <option value="{{ gender }}">{{ genders_mapping[gender] }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                    <div class="date_row">
                        <select name="birthyear" class="short_dropdown" required>
                            {% if not user_info['birthdate'] %}
                                <option disabled selected value> -- birth year --</option>
                            {% else %}
                                <option disabled>-- birth year --</option>
                                <option selected>{{ user_info['birthdate'].split("-")[0] }}</option>
                            {% endif %}
                            {% for i in range(1900, 2011) %}
                            <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                        <select name="birthmonth" class="short_dropdown" required>
                            {% if not user_info['birthdate'] %}
                                <option disabled selected value> -- birth month --</option>
                            {% else %}
                                <option disabled>-- birth month --</option>
                                <option selected>{{ user_info['birthdate'].split("-")[1] }}</option>
                            {% endif %}
                            {% for i in range(1, 13) %}
                            <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                        <select id="birthday" name="birthday" class="short_dropdown" required>
                            {% if not user_info['birthdate'] %}
                                <option disabled selected value> -- birth day --</option>
                            {% else %}
                                <option disabled>-- birth day --</option>
                                <option selected>{{ user_info['birthdate'].split("-")[2] }}</option>
                            {% endif %}
                            {% for i in range(1, 32) %}
                            <option value="{{ i }}">{{ i }}</option> 
                            {% endfor %} 
                        </select>
                    </div>
                    <input type="text" name="phone_number" placeholder="Phone Number" value="{{ user_info['phone_number'] }}">
                    <input type="text" name="emergency_name" placeholder="Emergency Contact Name" value="{{ user_info['emergency_name'] }}">
                    <input type="text" name="emergency_phone" placeholder="Emergency Phone Contact" value="{{ user_info['emergency_phone'] }}">
                    <button class="button" id="save_profile_edits">Save Changes</button>
                </form>
            </div>
        </div>
        <a class="main_button logout" href="{{ url_for('logout') }}">Logout</a>
        <div class="my_flashes">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        </div>
    </body>
</html>
