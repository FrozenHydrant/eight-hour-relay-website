<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/static/css/generic_information_page.css">
</head>

<body>
    <div class="bottom_panel">
        <div class="main_content">
            <h3 class="inner_title">
                Reset Team Code
            </h3>
            <p class="inner_text">You are about to reset the code for your team <b>{{team_info["team_name"]}}</b>
                {{team_info["division"]}}. Please make sure this is correct before proceeding. Once you press the "Reset
                Code" button below, your old code will be invalidated, and you will see a new one.</p>
            <form method="POST">
                <input type="hidden" name="team_id" value="{{ team_info['id'] }}">
                <button class="button">Reset Code</button>
            </form>
        </div>
    </div>

</body>

</html>
