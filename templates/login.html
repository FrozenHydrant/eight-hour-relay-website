<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/static/css/registration.css">
  </head>
  <body>
    <div class="login">
      <h3>Login</h3>
      <form method="POST" class="login_form">
        <input type="hidden" name="next_page" value="{{ next_page or '' }}">
        <input type="text" class="text_input" name="email" placeholder="Email">
        <input type="password" class="text_input" name="password" placeholder="Password">
        <button class="submit">Login</button>
      </form>
    </div>
    <div class="extra_text">
      <p>Don't have an account? <a href="{{ url_for('registration') }}">Sign up</a></p>
    </div>
    <div class="flashes">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    </div>
  </body>
</html>
